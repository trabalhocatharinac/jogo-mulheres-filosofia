<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mulheres da Filosofia</title>

<style>
body{font-family:Arial, Helvetica, sans-serif;background:#2b0f1b;color:white;text-align:center;margin:0}

h1{margin-top:40px}
.container{margin-top:30px}

.menu{display:flex;flex-direction:column;align-items:center;background:#4a0f2d;padding:30px;border-radius:15px;width:260px;margin:auto;box-shadow:0 0 15px rgba(0,0,0,0.4);gap:10px}

input{padding:10px;border-radius:8px;border:none;width:200px}

button{padding:12px 20px;border:none;border-radius:10px;background:#7a1e48;color:white;cursor:pointer;font-weight:bold;width:200px}
button:hover{background:#a02c5e}

.grid{display:grid;grid-template-columns: repeat(5,100px);gap:12px;justify-content:center;margin-top:30px}

.card{width:90px;height:110px;background:#6b1c3f;border-radius:10px;cursor:pointer;perspective:600px}

.inner{position:relative;width:100%;height:100%;transition:transform 0.5s;transform-style:preserve-3d}

.card.virada .inner{transform:rotateY(180deg)}

.frente,.verso{position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px}

.frente{background:#6b1c3f;font-size:24px}

.verso{background:#3a0f23;transform:rotateY(180deg)}

.verso img{width:80px;height:80px;object-fit:cover;border-radius:6px}

.name{font-size:10px;margin-top:2px}

#qr{position:fixed;bottom:10px;right:10px;width:90px}

.quizBox{max-width:420px;margin:auto;text-align:left}
.quizBox label{display:block;margin-bottom:6px}

.infoBox{max-width:500px;margin:20px auto;background:#3a0f23;padding:15px;border-radius:10px}

.timer{margin-top:10px;font-weight:bold}

.final{background:#3a0f23;padding:20px;border-radius:10px;width:300px;margin:20px auto}

</style>
</head>

<body>

<img id="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=Projeto%20Mulheres%20da%20Filosofia">

<h1>Mulheres da Filosofia</h1>

<div class="container">

<div class="menu">
<input id="nome" placeholder="Seu nome">
<input id="turma" placeholder="Turma">
<button onclick="iniciar()">Iniciar</button>
<hr style="width:200px">
<button onclick="memoria()">Jogo da Memória</button>
<button onclick="quiz()">Quiz Filosófico</button>
<button onclick="ranking()">Classificação</button>
<button onclick="sobre()">Sobre as filósofas</button>
<div class="timer" id="timer"></div>
</div>

<div id="jogo"></div>

</div>

<script>

let jogador=""
let turma=""
let pontos=0
let tempo=0
let intervalo

function iniciar(){

jogador=document.getElementById("nome").value

turma=document.getElementById("turma").value

if(jogador==""||turma==""){
alert("Digite seu nome e turma")
return
}

iniciarTimer()

alert("Bem-vindo " + jogador + " da turma " + turma)

}

function iniciarTimer(){

clearInterval(intervalo)

intervalo=setInterval(()=>{

tempo++

let min=Math.floor(tempo/60)
let seg=tempo%60


document.getElementById("timer").innerText="Tempo: " + min + "m " + seg + "s"

},1000)

}

/* MEMORIA */

let primeiraCarta=null
let bloqueado=false
let pares=0

function memoria(){

let filosofas=[
{nome:"Hypatia",foto:"https://upload.wikimedia.org/wikipedia/commons/6/6f/Hypatia_portrait.png",frase:"Filósofa e matemática da Grécia antiga."},
{nome:"Hannah Arendt",foto:"https://upload.wikimedia.org/wikipedia/commons/1/1c/Hannah_Arendt_1975.jpg",frase:"Estudou política e totalitarismo."},
{nome:"Simone de Beauvoir",foto:"https://upload.wikimedia.org/wikipedia/commons/0/0f/Simone_de_Beauvoir2.png",frase:"Filósofa existencialista e feminista."},
{nome:"Mary Wollstonecraft",foto:"https://upload.wikimedia.org/wikipedia/commons/9/95/MaryWollstonecraft.jpg",frase:"Defendeu educação e direitos das mulheres."},
{nome:"Evelyn Fox Keller",foto:"https://upload.wikimedia.org/wikipedia/commons/5/5c/Evelyn_Fox_Keller.jpg",frase:"Filósofa da ciência que estudou ciência e gênero."},
{nome:"Judith Butler",foto:"https://upload.wikimedia.org/wikipedia/commons/7/7e/Judith_Butler_2012.jpg",frase:"Filósofa contemporânea que estuda gênero."},
{nome:"Angela Davis",foto:"https://upload.wikimedia.org/wikipedia/commons/2/2c/Angela_Davis_1974.jpg",frase:"Filósofa e ativista política."},
{nome:"Edith Stein",foto:"https://upload.wikimedia.org/wikipedia/commons/3/3a/Edith_Stein_1938.jpg",frase:"Fenomenóloga e pensadora alemã."},
{nome:"Simone Weil",foto:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Simone_Weil_1940.jpg",frase:"Filósofa francesa ligada à ética e espiritualidade."},
{nome:"Harriet Taylor Mill",foto:"https://upload.wikimedia.org/wikipedia/commons/7/76/Harriet_Taylor_Mill.jpg",frase:"Filósofa que influenciou o liberalismo."}
]

let cartas=[...filosofas,...filosofas]
cartas.sort(()=>Math.random()-0.5)

let html="<h2>Jogo da Memória</h2><div class='grid'>"

cartas.forEach((f)=>{

html+=`
<div class="card" data-nome="${f.nome}" data-frase="${f.frase}" onclick="virar(this)">
<div class="inner">
<div class="frente">?</div>
<div class="verso">
<img src="${f.foto}">
<div class="name">${f.nome}</div>
</div>
</div>
</div>
`

})

html+="</div>"


document.getElementById("jogo").innerHTML=html

primeiraCarta=null
bloqueado=false
pares=0

}

function virar(card){

if(bloqueado||card.classList.contains("virada"))return

card.classList.add("virada")

if(!primeiraCarta){
primeiraCarta=card
return
}

if(primeiraCarta.dataset.nome===card.dataset.nome){

pontos+=5
pares++

alert("Par encontrado! " + card.dataset.frase)

primeiraCarta=null

if(pares===10){
fimJogo()
}

}else{

bloqueado=true

setTimeout(()=>{

card.classList.remove("virada")
primeiraCarta.classList.remove("virada")

primeiraCarta=null
bloqueado=false

},900)

}

}

/* QUIZ */

function quiz(){

let perguntas=[
{q:"Quem escreveu 'O Segundo Sexo'?",op:["Simone de Beauvoir","Hannah Arendt","Hypatia"],correta:"Simone de Beauvoir"},
{q:"Qual filósofa viveu em Alexandria na Antiguidade?",op:["Hypatia","Mary Wollstonecraft","Hannah Arendt"],correta:"Hypatia"},
{q:"Quem escreveu 'A Condição Humana'?",op:["Hannah Arendt","Beauvoir","Hypatia"],correta:"Hannah Arendt"},
{q:"Quem escreveu 'Reivindicação dos Direitos da Mulher'?",op:["Mary Wollstonecraft","Arendt","Beauvoir"],correta:"Mary Wollstonecraft"},
{q:"Qual filósofa é ligada ao existencialismo?",op:["Simone de Beauvoir","Hypatia","Arendt"],correta:"Simone de Beauvoir"},
{q:"Quem estudou política e totalitarismo?",op:["Hannah Arendt","Hypatia","Wollstonecraft"],correta:"Hannah Arendt"},
{q:"Quem defendia educação para mulheres?",op:["Mary Wollstonecraft","Hypatia","Arendt"],correta:"Mary Wollstonecraft"},
{q:"Qual filósofa viveu na Grécia antiga e era matemática?",op:["Hypatia","Beauvoir","Arendt"],correta:"Hypatia"},
{q:"Quem estudou ciência, gênero e biologia?",op:["Evelyn Fox Keller","Arendt","Beauvoir"],correta:"Evelyn Fox Keller"},
{q:"Qual filósofa influenciou fortemente o feminismo moderno?",op:["Simone de Beauvoir","Hypatia","Arendt"],correta:"Simone de Beauvoir"}
]

let html="<h2>Quiz Filosófico</h2><div class='quizBox'>"

perguntas.forEach((p,i)=>{

html+=`<p>${p.q}</p>`

p.op.forEach(op=>{

html+=`<label><input type='radio' name='q${i}' value='${op}'> ${op}</label>`

})

})

html+=`<button onclick='corrigirQuiz()'>Enviar</button></div>`

window.quizData=perguntas


document.getElementById("jogo").innerHTML=html

}

function corrigirQuiz(){

let acertos=0

quizData.forEach((p,i)=>{

let r=document.querySelector(`input[name='q${i}']:checked`)

if(r&&r.value===p.correta)acertos++

})

pontos+=acertos*5

alert("Você acertou " + acertos + " de 10 perguntas!")

}

/* RANKING */

function ranking(){

localStorage.removeItem("ranking")

let html="<h2>Classificação</h2><p>Ranking reiniciado. Nenhum jogador registrado ainda.</p>"

document.getElementById("jogo").innerHTML=html

}

/* SOBRE */

function sobre(){

let html=`<div class='infoBox'>
<h2>Filósofas do jogo</h2>
<p><b>Hypatia</b> — filósofa e matemática da Antiguidade.</p>
<p><b>Hannah Arendt</b> — estudou política e totalitarismo.</p>
<p><b>Simone de Beauvoir</b> — filósofa existencialista e feminista.</p>
<p><b>Mary Wollstonecraft</b> — defendeu os direitos das mulheres.</p>
<p><b>Evelyn Fox Keller</b> — filósofa da ciência que estudou ciência e gênero.</p>
</div>`


document.getElementById("jogo").innerHTML=html

}

/* FINAL */

function fimJogo(){

clearInterval(intervalo)

let html=`
<div class='final'>
<h2>Parabéns!</h2>
<p>${jogador}, você completou o jogo.</p>
<p>Pontos: ${pontos}</p>
<p>Tempo: ${tempo} segundos</p>
</div>
`


document.getElementById("jogo").innerHTML=html

}

</script>

</body>
</html>
